name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 51.79.250.113
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/anlaa-tools
            git pull origin main
            docker compose up --build --force-recreate -d
            docker image prune -f
            sleep 15
            docker compose ps
            docker compose exec -T anlc wget -qO- http://127.0.0.1:4000/health || (echo "Health check FAILED" && docker compose logs --tail=50 anlc && exit 1)
