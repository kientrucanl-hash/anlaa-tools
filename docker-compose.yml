services:
  anlc:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    volumes:
      # Persist SQLite database outside container
      - anlc_data:/app/server/db

volumes:
  anlc_data:
