version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mecalc
      POSTGRES_USER: mecalc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mecalc"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mecalc:${POSTGRES_PASSWORD}@postgres:5432/mecalc
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_SOCKET_URL: ${SOCKET_PUBLIC_URL:-http://localhost:4000}
      REDIS_URL: redis://redis:6379
      # Optional: path to SQLite DB for one-time data migration
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-}
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mecalc:${POSTGRES_PASSWORD}@postgres:5432/mecalc
      JWT_SECRET: ${JWT_SECRET}
      SOCKET_PORT: 4000
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      NODE_ENV: production
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
