<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <title>Lịch sử Dự toán — ANLAA Mecalc</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('anlaa_theme') || 'dark');</script>
    <link rel="stylesheet" href="css/styles.css?v=3.23">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay" style="display:none;">
    <div class="login-card">
        <div class="login-brand">
            <img src="logo-tool-anlc.webp" alt="Dự toán ANLAA" class="login-logo">
        </div>
        <form id="loginForm" autocomplete="off">
            <div class="login-field">
                <label for="loginUsername">Tên đăng nhập</label>
                <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required autocomplete="username">
            </div>
            <div class="login-field">
                <label for="loginPassword">Mật khẩu</label>
                <div class="pwd-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" id="togglePassword" class="toggle-pwd">👁</button>
                </div>
            </div>
            <p id="loginError" class="login-error"></p>
            <button type="submit" id="loginBtn" class="btn btn-primary w-full">Đăng nhập</button>
        </form>
    </div>
</div>

<div id="appContainer" class="app-container">

    <!-- SIDEBAR LEFT -->
    <aside id="appSidebar" class="app-sidebar no-print"></aside>

    <main class="spage-main">
        <div class="spage-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="sidebarToggle" class="sidebar-toggle-btn" title="Mở Menu">
                    <i data-lucide="menu"></i>
                </button>
                <div>
                    <h2 style="margin:0;">Lịch sử Dự toán</h2>
                    <p style="margin-top:4px;">Tất cả dự toán đã lưu — click vào dự án để mở trong Calculator</p>
                </div>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="history-toolbar">
            <select id="filterStatus" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="draft">Bản nháp</option>
                <option value="pending">Chờ duyệt</option>
                <option value="approved">Đã duyệt</option>
                <option value="rejected">Từ chối</option>
            </select>
            <button id="btnRefresh" class="btn btn-secondary btn-sm">
                <i data-lucide="refresh-cw"></i> Làm mới
            </button>
        </div>

        <!-- Projects list -->
        <div id="historyList" class="history-list">
            <div class="history-loading">Đang tải...</div>
        </div>
    </main>
</div>

<!-- Project detail modal -->
<div id="detailModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <div>
                <h3 id="detailName">Tên dự án</h3>
                <p id="detailMeta" class="modal-meta"></p>
            </div>
            <div class="modal-header-actions">
                <span id="detailStatus" class="status-badge"></span>
                <button id="detailClose" class="btn btn-secondary btn-sm"><i data-lucide="x"></i></button>
            </div>
        </div>
        <div class="modal-body">
            <div id="detailBOQWrap">
                <table class="admin-table boq-table">
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Hạng mục</th>
                            <th>Loại</th>
                            <th>Khối lượng</th>
                            <th>Đơn vị</th>
                        </tr>
                    </thead>
                    <tbody id="detailBOQBody">
                        <tr><td colspan="5" class="table-empty">Không có hạng mục</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="modal-actions mt-2">
                <button id="btnOpenInCalc" class="btn btn-primary">
                    <i data-lucide="calculator"></i> Mở trong Calculator
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js?v=3.23"></script>
<script>
const STATUS_LABELS = {
    draft:    { text: 'Bản nháp',  cls: 'badge-draft' },
    pending:  { text: 'Chờ duyệt', cls: 'badge-pending' },
    approved: { text: 'Đã duyệt',  cls: 'badge-approved' },
    rejected: { text: 'Từ chối',   cls: 'badge-rejected' }
};

let allProjects = [];
let selectedProject = null;

function formatDate(iso) {
    if (!iso) return '—';
    return iso.replace('T', ' ').slice(0, 16);
}

function statusBadgeHTML(status) {
    const s = STATUS_LABELS[status] || { text: status, cls: '' };
    return `<span class="status-badge ${s.cls}">${s.text}</span>`;
}

async function loadHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '<div class="history-loading">Đang tải...</div>';
    try {
        allProjects = await API.getProjects();
        renderList();
    } catch (err) {
        list.innerHTML = `<div class="history-loading" style="color:var(--color-error);">Lỗi: ${err.message}</div>`;
    }
}

function renderList() {
    const filter = document.getElementById('filterStatus').value;
    const filtered = filter ? allProjects.filter(p => p.status === filter) : allProjects;
    const list = document.getElementById('historyList');

    if (filtered.length === 0) {
        list.innerHTML = '<div class="history-loading">Không có dự toán nào.</div>';
        return;
    }

    list.innerHTML = filtered.map(p => {
        const itemCount = Array.isArray(p.data) ? p.data.length : 0;
        const isShared = p.my_role && p.my_role !== 'owner';
        const sharedBadge = isShared
            ? `<span class="collab-role-badge role-${p.my_role}" title="Dự án của ${p.owner_name || 'người khác'}">
                   ${p.my_role === 'editor' ? '✏️ Chỉnh sửa' : '👁 Chỉ xem'} · ${p.owner_name || '?'}
               </span>`
            : '';
        return `<div class="history-card" data-id="${p.id}">
            <div class="hcard-main">
                <div class="hcard-title">${p.name || 'Chưa đặt tên'}${sharedBadge}</div>
                <div class="hcard-meta">
                    <span><i data-lucide="map-pin" style="width:12px;height:12px;vertical-align:middle;"></i> ${p.address || 'Chưa có địa chỉ'}</span>
                    <span><i data-lucide="list" style="width:12px;height:12px;vertical-align:middle;"></i> ${itemCount} hạng mục</span>
                    <span><i data-lucide="clock" style="width:12px;height:12px;vertical-align:middle;"></i> ${formatDate(p.updated_at)}</span>
                </div>
            </div>
            <div class="hcard-right">
                ${statusBadgeHTML(p.status)}
                <button class="btn btn-secondary btn-sm hcard-open-btn" data-id="${p.id}">
                    <i data-lucide="eye"></i>
                </button>
                <button class="btn btn-primary btn-sm hcard-calc-btn" data-id="${p.id}" title="Mở trong Calculator">
                    <i data-lucide="calculator"></i>
                </button>
            </div>
        </div>`;
    }).join('');

    lucide.createIcons();

    list.querySelectorAll('.hcard-open-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            openDetail(parseInt(btn.dataset.id));
        });
    });

    list.querySelectorAll('.hcard-calc-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            openInCalculator(parseInt(btn.dataset.id));
        });
    });

    list.querySelectorAll('.history-card').forEach(card => {
        card.addEventListener('click', () => openDetail(parseInt(card.dataset.id)));
    });
}

function openDetail(id) {
    selectedProject = allProjects.find(p => p.id === id);
    if (!selectedProject) return;

    document.getElementById('detailName').textContent = selectedProject.name || 'Chưa đặt tên';
    document.getElementById('detailMeta').textContent =
        `${selectedProject.address || ''} · Cập nhật: ${formatDate(selectedProject.updated_at)}`;
    document.getElementById('detailStatus').outerHTML = statusBadgeHTML(selectedProject.status)
        .replace('class="status-badge', 'id="detailStatus" class="status-badge');

    const items = Array.isArray(selectedProject.data) ? selectedProject.data : [];
    const tbody = document.getElementById('detailBOQBody');
    if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Không có hạng mục</td></tr>';
    } else {
        tbody.innerHTML = items.map((item, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${item.name || '—'}</td>
                <td>${item.type || '—'}</td>
                <td>${item.quantity ?? '—'}</td>
                <td>${item.unit || '—'}</td>
            </tr>`).join('');
    }

    document.getElementById('detailModal').style.display = 'flex';
    lucide.createIcons();
}

function openInCalculator(id) {
    const project = allProjects.find(p => p.id === id);
    if (!project) return;
    localStorage.setItem('anlaa_open_project_id', project.id);
    if (project.my_role) localStorage.setItem('anlaa_open_project_role', project.my_role);
    if (project.owner_name) localStorage.setItem('anlaa_open_project_owner', project.owner_name);
    window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', async () => {
    const ok = await initAuth();
    if (!ok) return;

    initAppSidebar({ activePage: 'history' });

    await loadHistory();

    document.getElementById('filterStatus').addEventListener('change', renderList);
    document.getElementById('btnRefresh').addEventListener('click', loadHistory);

    document.getElementById('detailClose').addEventListener('click', () => {
        document.getElementById('detailModal').style.display = 'none';
    });
    document.getElementById('detailModal').addEventListener('click', e => {
        if (e.target === document.getElementById('detailModal')) {
            document.getElementById('detailModal').style.display = 'none';
        }
    });
    document.getElementById('btnOpenInCalc').addEventListener('click', () => {
        if (selectedProject) openInCalculator(selectedProject.id);
    });
});
</script>
</body>
</html>
