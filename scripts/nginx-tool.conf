# Nginx config cho tool.kientrucanl.vn — Next.js + Socket.io
# Deploy: sudo cp nginx-tool.conf /etc/nginx/sites-available/tool
#         sudo ln -sf /etc/nginx/sites-available/tool /etc/nginx/sites-enabled/tool
#         sudo nginx -t && sudo systemctl reload nginx

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream socketio {
    server 127.0.0.1:4000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tool.kientrucanl.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tool.kientrucanl.vn;

    # SSL — managed by Certbot (auto-renewed)
    ssl_certificate     /etc/letsencrypt/live/tool.kientrucanl.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tool.kientrucanl.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Increase body size for snapshot saves (up to 3MB)
    client_max_body_size 3m;

    # ── Socket.io (/socket.io/ prefix) ─────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://socketio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── Next.js app ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;

        # Cache static Next.js assets
        location ~* \/_next\/static\/ {
            proxy_pass         http://nextjs;
            proxy_cache_valid  200 365d;
            add_header         Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ── Health check (bypass proxy auth) ───────────────────────────────────
    location = /health {
        proxy_pass http://nextjs;
        access_log off;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
    gzip_proxied any;
}
