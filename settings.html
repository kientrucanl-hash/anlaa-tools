<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <title>Cài đặt Tài khoản — ANLAA Mecalc</title>
    <!-- Anti-FOUC: apply saved theme before first paint -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('anlaa_theme') || 'dark');</script>
    <link rel="stylesheet" href="css/styles.css?v=3.23">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay" style="display:none;">
    <div class="login-card">
        <div class="login-brand">
            <img src="logo-tool-anlc.webp" alt="Dự toán ANLAA" class="login-logo">
        </div>
        <form id="loginForm" autocomplete="off">
            <div class="login-field">
                <label for="loginUsername">Tên đăng nhập</label>
                <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required autocomplete="username">
            </div>
            <div class="login-field">
                <label for="loginPassword">Mật khẩu</label>
                <div class="pwd-wrapper">
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" id="togglePassword" class="toggle-pwd">👁</button>
                </div>
            </div>
            <p id="loginError" class="login-error"></p>
            <button type="submit" id="loginBtn" class="btn btn-primary w-full">Đăng nhập</button>
        </form>
    </div>
</div>

<div id="appContainer" class="app-container">

    <!-- SIDEBAR LEFT -->
    <aside id="appSidebar" class="app-sidebar no-print"></aside>

    <main class="spage-main">
        <div class="spage-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="sidebarToggle" class="sidebar-toggle-btn" title="Mở Menu">
                    <i data-lucide="menu"></i>
                </button>
                <div>
                    <h2 style="margin:0;">Cài đặt Tài khoản</h2>
                    <p style="margin-top:4px;">Thông tin cá nhân và bảo mật</p>
                </div>
            </div>
        </div>

        <!-- Profile card -->
        <div class="spage-card">
            <h3>Thông tin tài khoản</h3>
            <div class="settings-form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="profileUsername" readonly>
            </div>
            <div class="settings-form-group">
                <label>Vai trò</label>
                <input type="text" id="profileRole" readonly>
            </div>
        </div>

        <!-- Change password card -->
        <div class="spage-card">
            <h3>Đổi mật khẩu</h3>
            <form id="changePasswordForm" autocomplete="off">
                <div class="settings-form-group">
                    <label for="currentPassword">Mật khẩu hiện tại</label>
                    <input type="password" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" autocomplete="current-password" required>
                </div>
                <div class="settings-form-group">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password" required>
                </div>
                <div class="settings-form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password" required>
                </div>
                <p id="pwdMsg" class="settings-msg"></p>
                <button type="submit" id="btnChangePassword" class="btn btn-primary">
                    <i data-lucide="lock"></i> Đổi mật khẩu
                </button>
            </form>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js?v=3.23"></script>
<script>
function showMsg(el, type, text) {
    el.className = `settings-msg ${type}`;
    el.textContent = text;
}

document.addEventListener('DOMContentLoaded', async () => {
    const ok = await initAuth();
    if (!ok) return;

    initAppSidebar({ activePage: 'settings' });
    lucide.createIcons();

    // Fill profile info
    const user = getCurrentUser();
    if (user) {
        document.getElementById('profileUsername').value = user.username;
        document.getElementById('profileRole').value = user.role === 'admin' ? 'Quản trị viên' : 'KTS / Người dự toán';
    }

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgEl = document.getElementById('pwdMsg');
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const btn = document.getElementById('btnChangePassword');

        if (newPassword !== confirmPassword) {
            showMsg(msgEl, 'error', 'Mật khẩu xác nhận không khớp');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader"></i> Đang xử lý...';
        lucide.createIcons();

        try {
            await API.changePassword(currentPassword, newPassword);
            showMsg(msgEl, 'success', 'Đổi mật khẩu thành công! Vui lòng đăng nhập lại.');
            document.getElementById('changePasswordForm').reset();
            setTimeout(() => {
                handleLogout();
            }, 2000);
        } catch (err) {
            showMsg(msgEl, 'error', err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="lock"></i> Đổi mật khẩu';
            lucide.createIcons();
        }
    });
});
</script>
</body>
</html>
